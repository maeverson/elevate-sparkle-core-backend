# Development Profile Configuration
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sparkle_db
    username: sparkle_user
    password: sparkle_password
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    connect-retries: 10
    connect-retries-interval: 2s

aws:
  sqs:
    endpoint: ${SQS_ENDPOINT:http://localhost:4566}  # LocalStack endpoint

logging:
  level:
    com.elevate.sparkle: DEBUG
    org.springframework.security: DEBUG

# Local OTEL collector
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
